name: Daily Research Brief

on:
  schedule:
    - cron: '0 16 * * *'   # 16:00 UTC = 12:00 PM ET
  workflow_dispatch:         # allows manual trigger from GitHub Actions UI

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt --no-warn-script-location

      - name: Debug — check profile exists
        run: |
          echo "Working directory: $(pwd)"
          echo "output/ contents:"
          ls -la output/ || echo "output/ directory not found"
          echo "profile.json exists:" && test -f output/profile.json && echo "YES" || echo "NO"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        run: python run_pipeline.py

      - name: Commit seen_papers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/seen_papers.json
          git diff --staged --quiet || git commit -m "chore: update seen_papers.json [skip ci]"
          git push
